<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Asistencia_INTO_2026 - Sistema Final</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --accent: #00d4ff; --bg: #0f172a; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        .card { background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); max-width: 400px; margin: auto; text-align: center; }
        .btn { border: 2px solid var(--accent); background: transparent; color: white; padding: 10px; width: 100%; border-radius: 20px; cursor: pointer; margin: 10px 0; }
        .seccion { display: none; } .activo { display: block; }
        #reader { width: 100%; min-height: 250px; background: black; border-radius: 10px; }
        table { width: 100%; margin-top: 15px; border-collapse: collapse; color: white; }
        th, td { border: 1px solid var(--accent); padding: 5px; font-size: 12px; }
    </style>
</head>
<body>
    <div id="menu" class="card seccion activo">
        <h1>Asistencia_INTO_2026</h1>
        <button class="btn" onclick="iniciarEscaner()">ESTUDIANTE</button>
        <button class="btn" onclick="mostrarSeccion('seccion-docente')">DOCENTE</button>
    </div>

    <div id="seccion-alumno" class="card seccion">
        <h2>Escanear QR</h2>
        <div id="reader"></div>
        <button class="btn" onclick="location.reload()">VOLVER</button>
    </div>

    <div id="seccion-docente" class="card seccion">
        <h2>Panel Docente</h2>
        <select id="selectorGrado" onchange="generarQR()" style="width:100%; padding:10px;">
            <option value="">-- Selecciona Grado --</option>
            <option value="1 Software A">1 Software A</option>
            <option value="2 Software A">2 Software A</option>
            <option value="3 Software A">3 Software A</option>
            <option value="2 General B">2 General B</option>
            <option value="2 General C">2 General C</option>
            <option value="2 General D">2 General D</option>
        </select>
        <div id="qr-contenedor" style="margin-top:15px; background:white; padding:10px; display:inline-block;"></div>
        <button class="btn" onclick="cargarReporte()">VER REPORTES</button>
        <div id="area-reporte"></div>
        <button class="btn" onclick="location.reload()">VOLVER</button>
    </div>

    <script>
        const URL_APP = "https://script.google.com/macros/s/AKfycbwjnkHQrl9VGY3X6rfHcvzrSE9RDxJMXjJhsF2eFtBzdOxikx77x1-BCtJXRp_Uk3K-RA/exec";

        function mostrarSeccion(id) {
            document.querySelectorAll('.seccion').forEach(s => s.classList.remove('activo'));
            document.getElementById(id).classList.add('activo');
        }

        function iniciarEscaner() {
            mostrarSeccion('seccion-alumno');
            new Html5Qrcode("reader").start({ facingMode: "environment" }, { fps: 10, qrbox: 200 }, (decodedText) => {
                let info = JSON.parse(decodedText);
                fetch(URL_APP, { method: 'POST', body: JSON.stringify({ grado: info.grado, alumno: "Alumno" }) })
                .then(() => { alert("Asistencia registrada: " + info.grado); location.reload(); });
            });
        }

        function generarQR() {
            const grado = document.getElementById('selectorGrado').value;
            const cont = document.getElementById('qr-contenedor');
            cont.innerHTML = "";
            if(grado) new QRCode(cont, JSON.stringify({ grado: grado }));
        }

        function cargarReporte() {
            const area = document.getElementById('area-reporte');
            area.innerHTML = "Cargando...";
            fetch(URL_APP).then(res => res.json()).then(data => {
                let html = "<table><tr><th>Fecha</th><th>Alumno</th></tr>";
                for(let i=1; i<data.length; i++) html += `<tr><td>${data[i][0].substring(0,10)}</td><td>${data[i][2]}</td></tr>`;
                area.innerHTML = html + "</table>";
            });
        }
    </script>
</body>
</html>
