<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia INTO 2026</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --accent: #00d4ff; --bg: #0f172a; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        .card { background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); max-width: 400px; margin: auto; text-align: center; }
        .btn { border: 2px solid var(--accent); background: transparent; color: white; padding: 12px; width: 100%; border-radius: 20px; cursor: pointer; margin: 10px 0; font-weight: bold; }
        .seccion { display: none; } .activo { display: block; }
        #reader { width: 100%; min-height: 250px; background: black; border-radius: 10px; margin-bottom: 10px; }
        input { width: 90%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: none; }
        table { width: 100%; margin-top: 15px; border-collapse: collapse; font-size: 13px; color: white; }
        th, td { border: 1px solid #444; padding: 8px; text-align: left; }
    </style>
</head>
<body>

    <div id="menu" class="card seccion activo">
        <h1>Asistencia INTO 2026</h1>
        <button class="btn" onclick="mostrarSeccion('seccion-alumno')">ESTUDIANTE</button>
        <button class="btn" onclick="mostrarSeccion('seccion-docente')">DOCENTE</button>
    </div>

    <div id="seccion-alumno" class="card seccion">
        <h2>Registro de Asistencia</h2>
        <input type="text" id="nombreAlumno" placeholder="Escribe tu nombre completo">
        <div id="reader"></div>
        <button class="btn" onclick="iniciarEscaner()">INICIAR ESCÁNER</button>
        <button class="btn" onclick="location.reload()">VOLVER</button>
    </div>

    <div id="seccion-docente" class="card seccion">
        <h2>Panel Docente</h2>
        <select id="selectorGrado" onchange="generarQR()" style="width:100%; padding:10px; border-radius:5px;">
            <option value="">-- Selecciona Grado --</option>
            <option value="1 Software A">1 Software A</option>
            <option value="2 Software A">2 Software A</option>
            <option value="3 Software A">3 Software A</option>
            <option value="2 General B">2 General B</option>
            <option value="2 General C">2 General C</option>
            <option value="2 General D">2 General D</option>
        </select>
        <div id="qr-contenedor" style="margin-top:15px; background:white; padding:10px; display:inline-block;"></div>
        <button class="btn" onclick="cargarReporte()">VER REPORTES</button>
        <div id="area-reporte"></div>
        <button class="btn" onclick="location.reload()">VOLVER</button>
    </div>

    <script>
        const URL_APP = "https://script.google.com/macros/s/AKfycbx4z4apegkm5tYwKposGro1UEHRdd8q05NmHEnuY9rrgWNpycZk1sBGceXOXzOWPA7njA/exec";

        function mostrarSeccion(id) {
            document.querySelectorAll('.seccion').forEach(s => s.classList.remove('activo'));
            document.getElementById(id).classList.add('activo');
        }

        function iniciarEscaner() {
            const nombre = document.getElementById('nombreAlumno').value;
            if (!nombre) { alert("¡Escribe tu nombre primero!"); return; }
            
            const html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 200 }, (decodedText) => {
                html5QrCode.stop();
                let info = JSON.parse(decodedText);
                fetch(URL_APP, { 
                    method: 'POST', 
                    body: JSON.stringify({ grado: info.grado, alumno: nombre }) 
                })
                .then(res => res.text())
                .then(msg => {
                    alert(msg === "Duplicado" ? "Ya estás registrado." : "¡Asistencia registrada!");
                    location.reload();
                });
            });
        }

        function generarQR() {
            const grado = document.getElementById('selectorGrado').value;
            const cont = document.getElementById('qr-contenedor');
            cont.innerHTML = "";
            if(grado) new QRCode(cont, JSON.stringify({ grado: grado }));
        }

        function cargarReporte() {
            const grado = document.getElementById('selectorGrado').value;
            const area = document.getElementById('area-reporte');
            if(!grado) { alert("Selecciona un grado"); return; }
            area.innerHTML = "Cargando...";
            
            // Se agrega "&t=" + new Date().getTime() para evitar que el navegador cargue datos viejos de la caché
            fetch("https://script.google.com/macros/s/AKfycbx4z4apegkm5tYwKposGro1UEHRdd8q05NmHEnuY9rrgWNpycZk1sBGceXOXzOWPA7njA/exec" + "?grado=" + encodeURIComponent(grado) + "&t=" + new Date().getTime())
            .then(res => res.json())
            .then(data => {
                let html = "<table><tr><th>Fecha</th><th>Alumno</th></tr>";
                for(let i=1; i<data.length; i++) {
                    html += `<tr><td>${data[i][0].toString().substring(0,10)}</td><td>${data[i][2]}</td></tr>`;
                }
                area.innerHTML = html + "</table>";
            })
            .catch(err => area.innerHTML = "Error: Asegúrate de que el acceso esté como 'Cualquier persona'.");
        }
    </script>
</body>
</html>
